services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dory
      POSTGRES_PASSWORD: dory
      POSTGRES_DB: dory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dory"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5005:5005"
    environment:
      DORY_CONFIG: /etc/dory/dory.toml
      DORY_WORKSPACE_ROOT: /workspace
    volumes:
      - ./dory.toml:/etc/dory/dory.toml
      - ./workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: